# Render Blueprint — repo kökü: aProject (içinde project/backend var).
# Dashboard: New → Blueprint → bu dosyayı bağlayın veya Git repo ile otomatik algılatın.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: automl-agent-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: project/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: mock
      - key: PYTHONUNBUFFERED
        value: "1"
      # Neon / Render PostgreSQL connection string (Dashboard’da da eklenebilir)
      - key: DATABASE_URL
        sync: false
      # Örnek: https://xxx.vercel.app,http://localhost:5173
      - key: CORS_ORIGINS
        sync: false
